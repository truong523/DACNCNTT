<h1>iPhone 16 Plus</h1>
<p>Giá: 15,000,000 VNĐ</p>



<button onclick="payMomo()">Thanh toán MoMo</button>
<script>
  function payMomo() {
    fetch('http://localhost:3000/create-payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: 15000000 })
    })
    .then(res => {
      if (!res.ok) throw new Error('Lỗi HTTP ' + res.status);
      return res.json();
    })
    .then(data => {
      if (data.payUrl) {
        window.location.href = data.payUrl;
      } else {
        alert("Lỗi tạo thanh toán.");
      }
    })
    .catch(err => {
      alert('Lỗi: ' + err.message);
      console.error(err);
    });
  }
</script>
