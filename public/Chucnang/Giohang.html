<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Giỏ hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4">🛒 Giỏ hàng của bạn</h2>
    <div id="cartContainer"></div>
  </div>

 <script>
  function renderCart() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    let html = "";
    let total = 0;

    if (cart.length === 0) {
      html = "<p>Giỏ hàng trống.</p>";
    } else {
      html += `
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Ảnh</th>
              <th>Tên</th>
              <th>Màu</th>
              <th>Dung lượng</th>
              <th>Số lượng</th>
              <th>Giá</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody>`;

      cart.forEach((item, index) => {
        const itemTotal = item.quantity * item.price;
        total += itemTotal;
        html += `
          <tr>
            <td><img src="${item.img}" width="60"/></td>
            <td>${item.name}</td>
            <td>${item.color}</td>
            <td>${item.storage}</td>
            <td>
              <button class="btn btn-sm btn-secondary" onclick="decreaseQuantity(${index})">-</button>
              <span class="mx-2">${item.quantity}</span>
              <button class="btn btn-sm btn-secondary" onclick="increaseQuantity(${index})">+</button>
            </td>
            <td>${itemTotal.toLocaleString()}₫</td>
            <td><button class="btn btn-danger btn-sm" onclick="removeItem(${index})">Xóa</button></td>
            
            <td>
                <a href="/public/thanhtoan2.html" class="btn btn-primary btn-sm">Đặt hàng</a>
              </td>

          </tr>`;
      });

      html += `</tbody></table><h4 class="text-end">Tổng: ${total.toLocaleString()}₫</h4>`;
    }

    document.getElementById("cartContainer").innerHTML = html;
  }

  function increaseQuantity(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart[index].quantity += 1;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  function decreaseQuantity(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    if (cart[index].quantity > 1) {
      cart[index].quantity -= 1;
    } else {
      if (confirm("Bạn có muốn xóa sản phẩm này khỏi giỏ hàng không?")) {
        cart.splice(index, 1);
      }
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  renderCart();
</script>



</body>
</html>
