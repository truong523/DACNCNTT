<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanh Toán</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .status-container {
      max-width: 600px;
      margin: 100px auto;
      background-color: #ffffff;
      padding: 40px;
      text-align: center;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .icon-status {
      font-size: 60px;
      margin-bottom: 20px;
    }
    .error-icon {
      color: #dc3545;
    }
    .error-text {
      color: #dc3545;
      font-weight: bold;
    }
    .btn-back {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<div class="container status-container">
  <div class="icon-status error-icon">
    ⚠️
  </div>
  <h2 class="error-text">Thanh toán không thành công !</h2>
  <p>Thanh toán đã bị hủy bởi khách hàng hoặc lỗi tham chiếu.</p>
  <p class="mt-3">Khách hàng gặp lỗi hãy <strong>VUI LÒNG THỬ LẠI</strong>.</p>

  <a href="public/index.html" class="btn btn-primary btn-back">Tiếp tục mua sắm</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const resultCode = params.get("resultCode");

    if (resultCode == "0") {
        // Giao dịch thành công → Hiển thị nội dung cảm ơn
        document.querySelector('.error-text').textContent = 'Thanh toán thành công!';
        document.querySelector('.icon-status').textContent = '✅';
        document.querySelector('.icon-status').classList.remove('error-icon');
        document.querySelector('.error-text').classList.remove('error-text');
        document.querySelectorAll('p')[0].textContent = 'Cảm ơn bạn đã mua hàng.';
        document.querySelectorAll('p')[1].style.display = 'none';
    }
</script>

</body>
</html>
